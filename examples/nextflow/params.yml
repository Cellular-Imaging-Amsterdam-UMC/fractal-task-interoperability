# Nextflow parameter template — Cellpose SAM Segmentation
#
# Generated from __FRACTAL_MANIFEST__.json. Edit as needed.
#
# NOTE: zarr_urls (the OME-Zarr images to segment) is a pipeline-level
# parameter — it is NOT listed here because it is passed as a Nextflow
# channel (one job per image).  Specify it via -params-file or on the
# command line:
#
#   zarr_urls:
#     - "/path/to/plate.zarr/B/03/0"   # one entry per image
#     - "/path/to/plate.zarr/B/04/0"   # parallel jobs

# ── Task parameters (from __FRACTAL_MANIFEST__.json) ─────────────────────────

# Channels to use for segmentation. It must contain between 1 and 3 channel
# identifiers.
# channels (required — uncomment and set a value):
# channels:
#   mode: "label"       # Options: "label" | "wavelength_id" | "index"
#   identifiers:
#     - "DAPI"          # 1–3 channel identifiers

# Name of the resulting label image. Optionally, it can contain a placeholder
# "{channel_identifier}" which will be replaced by the first channel
# identifier specified in the channels parameter.
label_name: '{channel_identifier}_segmented'

# If the OME-Zarr has multiple resolution levels, the level to use can be
# specified here. If not provided, the highest resolution level will be used.
level_path: ~

# Configuration for the segmentation iterator. This can be used to specify
# masking and/or a ROI table.
iterator_configuration: ~

# Path to a custom Cellpose model. If not set, the default "cpsam" model will
# be used.
custom_model: ~

# Advanced parameters for Cellpose segmentation.
advanced_parameters:
  anisotropy: null
  augment: false
  batch_size: 8
  bsize: 256
  cellprob_threshold: 0.0
  diameter: null
  do_3D: true
  flow3D_smooth: 0
  flow_threshold: 0.4
  invert: false
  max_size_fraction: 0.4
  min_size: 15
  niter: null
  normalization:
    mode: default
  resample: true
  stitch_threshold: 0.0
  tile_overlap: 0.1
  verbose: false

# Configuration for pre- and post-processing steps.
pre_post_process:
  post_process: []
  pre_process: []

# Configuration to create a masking ROI table after segmentation.
create_masking_roi_table:
  mode: Skip Creating Masking ROI Table

# Whether to overwrite an existing label image. Defaults to True.
overwrite: true
